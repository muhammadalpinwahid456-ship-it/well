<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Debug</title>
</head>
<body>
    <h1>Firebase Debug</h1>
    <button onclick="checkUsers()">Check Users</button>
    <div id="output"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDzDRaHEASBWO0dDKOIlvlku3lN01b89iw",
            authDomain: "alvin-f573e.firebaseapp.com",
            projectId: "alvin-f573e",
            storageBucket: "alvin-f573e.firebasestorage.app",
            messagingSenderId: "718704784181",
            appId: "1:718704784181:web:db5fe912a3cb3b0675d27c",
            measurementId: "G-NHLWBMV307",
            databaseURL:"https://alvin-f573e-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        window.checkUsers = async function() {
            const usersRef = ref(database, 'users');
            const snapshot = await get(usersRef);
            const output = document.getElementById('output');
            if (snapshot.exists()) {
                output.innerHTML = '<pre>' + JSON.stringify(snapshot.val(), null, 2) + '</pre>';
            } else {
                output.innerHTML = 'No users found';
            }
        };
    </script>
</body>
</html>
